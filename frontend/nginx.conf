server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api requests to the gateway (Docker DNS name)
    location /api/ {
        proxy_pass http://loxia-gateway:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy WebSocket (SockJS/STOMP) to the gateway → chat-service
    location /ws-chat/ {
        proxy_pass http://loxia-gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    # SPA fallback: any path not matching a real file is served as index.html
    # so React Router can handle client-side navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Improve caching for hashed assets produced by Vite
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health endpoint used by the Docker HEALTHCHECK
    location /health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
