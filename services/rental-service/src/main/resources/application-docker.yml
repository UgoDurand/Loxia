# =====================================================================
# Loxia — rental-service — Docker profile
#
# Activated by SPRING_PROFILES_ACTIVE=docker in docker-compose.yml.
# Overrides the JDBC URL and the inter-service base URLs so rental
# reaches its peers through the Docker DNS names.
# =====================================================================

spring:
  datasource:
    url: jdbc:postgresql://loxia-db:5432/${RENTAL_DB_NAME:rental_db}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:changeme}

services:
  auth-url: ${AUTH_SERVICE_URL:http://auth-service:8081}
  catalog-url: ${CATALOG_SERVICE_URL:http://catalog-service:8082}
