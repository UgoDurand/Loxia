# =====================================================================
# Loxia — rental-service — default configuration
#
# Defaults used when running the service OUTSIDE of Docker. The
# `docker` profile (application-docker.yml) overrides the JDBC URL
# to use the loxia-db Docker DNS name.
# =====================================================================

spring:
  application:
    name: rental-service

  datasource:
    url: jdbc:postgresql://localhost:5432/rental_db
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

logging:
  level:
    root: INFO
    com.loxia.rental: DEBUG
