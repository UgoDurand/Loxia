# =====================================================================
# Loxia — catalog-service — Docker profile
#
# Activated by SPRING_PROFILES_ACTIVE=docker in docker-compose.yml.
# Only overrides the JDBC URL so the service reaches the database
# through the Docker DNS name `loxia-db`.
# =====================================================================

spring:
  datasource:
    url: jdbc:postgresql://loxia-db:5432/${CATALOG_DB_NAME:catalog_db}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:changeme}

services:
  auth-url: ${AUTH_SERVICE_URL:http://auth-service:8081}
  rental-url: ${RENTAL_SERVICE_URL:http://rental-service:8083}
